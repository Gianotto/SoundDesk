name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: release/
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: release/
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/windows/
      - uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: dist/linux/
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/windows/*.exe
            dist/windows/*.exe.blockmap
            dist/windows/latest.yml
            dist/linux/*.AppImage
            dist/linux/*.AppImage.blockmap
            dist/linux/*.deb
            dist/linux/latest-linux.yml
